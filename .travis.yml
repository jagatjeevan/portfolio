language: node_js

node_js:
  - "8.10.0"

script:
  - node --version
  - npm install
  - npm run sass-lint
  - npm run eslint
  - npm run prod

deploy:
  provider: pages
  skip-cleanup: true
  github-token: $PORTFOLIO_TOKEN
  local-dir: build
  keep-history: true
  on:
    branch: master

git:
  depth: 10
